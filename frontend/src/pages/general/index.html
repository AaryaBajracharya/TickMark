<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tick Mark Home Appliances</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --brand-green: #8DB021;
            --brand-green-dark: #6f8f18;
            --ink: #1f2933;
            --paper: #f4f6f9;
        }
        body { background-color: var(--paper); color: var(--ink); font-family: Arial, sans-serif; }
        .container { max-width: 1300px; }
        .navbar-brand { font-weight: bold; font-size: 1.5rem; }
        .navbar .form-control { border-color: var(--brand-green) !important; }
        .navbar .form-control:focus { border-color: var(--brand-green-dark) !important; box-shadow: 0 0 0 0.25rem rgba(141,176,33,0.25) !important; }
        .btn-primary, .btn-success, .btn-outline-primary:hover, .btn-outline-success:hover { background-color: var(--brand-green) !important; border-color: var(--brand-green) !important; color: white !important; }
        .btn-primary:hover, .btn-success:hover { background-color: var(--brand-green-dark) !important; border-color: var(--brand-green-dark) !important; }
        .btn-outline-primary, .btn-outline-success { border-color: var(--brand-green) !important; color: var(--brand-green) !important; }
        .text-primary { color: var(--brand-green) !important; }
        .product-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(15,23,42,0.12) !important; }
        .brand-slider { padding: 1rem; scrollbar-width: thin; scrollbar-color: var(--brand-green) #f1f1f1; }
        .brand-slider::-webkit-scrollbar { height: 8px; }
        .brand-slider::-webkit-scrollbar-thumb { background: var(--brand-green); border-radius: 50px; }
        .brand-logo { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .brand-logo:hover { transform: translateY(-6px); box-shadow: 0 12px 30px rgba(0,0,0,0.15) !important; }
        .detail-image { max-height: 450px; object-fit: contain; }
        .product-gallery-thumb { opacity: 0.7; transition: opacity 0.2s ease, box-shadow 0.2s ease; }
        .product-gallery-thumb:hover { opacity: 1; }
        .product-gallery-thumb.active { opacity: 1; border-color: var(--brand-green) !important; box-shadow: 0 0 0 2px rgba(141,176,33,0.35); }
        .spec-table th { width: 36%; color: #52616d; }
        .badge-soft { background: rgba(141,176,33,0.12); color: #536b12; }
        .whatsapp-float {
            position: fixed; width: 60px; height: 60px; bottom: 40px; right: 30px;
            background-color: #25D366; color: #FFF; border-radius: 50%; text-align: center;
            font-size: 38px; box-shadow: 2px 4px 12px rgba(0,0,0,0.3); z-index: 1000;
            display: flex; align-items: center; justify-content: center; transition: all 0.3s ease; text-decoration: none;
        }
        .whatsapp-float:hover { transform: scale(1.08); background-color: #128C7E; color: #fff; }
        .speech-bubble {
            position: absolute; right: 75px; bottom: 10px; background-color: #ffffff; color: #333;
            padding: 8px 14px; border-radius: 20px; font-size: 14px; white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); opacity: 0; visibility: hidden; transform: translateX(10px);
            transition: all 0.3s ease; pointer-events: none;
        }
        .whatsapp-float:hover .speech-bubble { opacity: 1; visibility: visible; transform: translateX(0); }
        .admin-btn-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .admin-btn { display: inline-flex; align-items: center; background-color: #6c757d; color: white; padding: 12px 24px; border-radius: 50px; font-weight: 500; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.25); }
        @media (max-width: 768px) {
            .whatsapp-float { width: 55px; height: 55px; font-size: 32px; bottom: 25px; right: 20px; }
            .speech-bubble { display: none; }
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="/">
                <img src="/static/img/Weblogo.png" alt="Tick Mark Home Appliances Logo" height="50" class="me-2">
                <span class="fw-bold fs-4" style="color:#333;">Tick-Mark</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain" aria-controls="navbarMain" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link <%= path === '/products' ? 'active' : '' %>" href="/products">Products</a></li>
                    <li class="nav-item"><a class="nav-link <%= path === '/contact' ? 'active' : '' %>" href="/contact">Contact</a></li>
                </ul>
                <form class="d-flex mx-auto my-2 my-lg-0" action="/search" method="get" style="max-width:420px;width:100%;">
                    <input class="form-control me-2 rounded-pill" type="search" name="q" value="<%= query.q || '' %>" placeholder="Search TVs, ACs, Fridges..." aria-label="Search">
                    <button class="btn btn-success rounded-pill px-4" type="submit"><i class="bi bi-search"></i></button>
                </form>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        <% Object.keys(messages || {}).forEach(function(type) { %>
            <% messages[type].forEach(function(message) { %>
                <div class="alert alert-<%= type === 'error' ? 'danger' : type %> text-center"><%= message %></div>
            <% }) %>
        <% }) %>
        <%- body %>
    </main>

    <footer class="bg-light text-center py-4 mt-auto border-top">
        <p class="mb-0 text-muted">&copy; 2026 Tick Mark Home Appliances - Kathmandu, Nepal</p>
        <small class="text-muted">All rights reserved</small>
    </footer>

    <a href="https://wa.me/<%= storePhone %>?text=Hello%20from%20Tick%20Mark%20website!%20I%20need%20help%20with..." class="whatsapp-float" target="_blank" rel="noopener noreferrer" title="Chat with us on WhatsApp">
        <i class="bi bi-whatsapp"></i>
        <span class="speech-bubble">Chat with us</span>
    </a>

    <div id="admin-trigger" class="admin-btn-container" style="display:none;">
        <a href="/admin/login" class="admin-btn"><i class="bi bi-shield-lock-fill me-2"></i> Admin Area</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key.toUpperCase() === 'A') {
                e.preventDefault();
                const btn = document.getElementById('admin-trigger');
                btn.style.display = btn.style.display === 'none' || btn.style.display === '' ? 'block' : 'none';
                setTimeout(() => { btn.style.display = 'none'; }, 10000);
            }
        });
    </script>
</body>
</html>
